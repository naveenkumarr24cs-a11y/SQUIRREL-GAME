<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Squirrel Game</title>
    <meta name="description" content="Squirrel Game — A pixel-perfect upscaled 2D endless runner arcade game built with HTML5 Canvas. Avoid obstacles, collect acorns, and beat the high score!">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="game-wrapper" id="mainContainer">
        <canvas id="gameCanvas"></canvas>
    </main>

    <!-- Hidden HTML5 Audio Element for Background Music -->
    <audio id="bgMusic" src="Assets/music.ogg" loop></audio>

    <!-- Game Engine Entrypoint -->
    <script src="game.js"></script>
</body>
</html>
